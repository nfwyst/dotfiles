<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代码评审报告 — __REPO_NAME__</title>
  <style>
    :root {
      --color-p0: #dc2626;
      --color-p0-bg: #fef2f2;
      --color-p0-border: #fca5a5;
      --color-p1: #d97706;
      --color-p1-bg: #fffbeb;
      --color-p1-border: #fcd34d;
      --color-p2: #2563eb;
      --color-p2-bg: #eff6ff;
      --color-p2-border: #93c5fd;
      --color-bg: #f8fafc;
      --color-card: #ffffff;
      --color-border: #e2e8f0;
      --color-text: #1e293b;
      --color-text-secondary: #64748b;
      --color-code-bg: #f1f5f9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      padding: 24px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    /* --- Header --- */
    .report-header {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 20px;
    }

    .report-header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--color-text-secondary);
    }

    .meta-item .label { font-weight: 600; color: var(--color-text); }

    /* --- P0 Alert Banner --- */
    .p0-alert {
      background: var(--color-p0-bg);
      border: 1px solid var(--color-p0-border);
      border-left: 4px solid var(--color-p0);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: __P0_ALERT_DISPLAY__;
    }

    .p0-alert-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-p0);
      margin-bottom: 8px;
    }

    .p0-alert-list {
      list-style: none;
      font-size: 14px;
    }

    .p0-alert-list li {
      padding: 2px 0;
      color: var(--color-text);
    }

    /* --- Summary Bar --- */
    .summary-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      background: var(--color-card);
      border: 1px solid var(--color-border);
    }

    .summary-chip .count {
      font-size: 20px;
      font-weight: 700;
    }

    .summary-chip.p0 { border-color: var(--color-p0); color: var(--color-p0); }
    .summary-chip.p1 { border-color: var(--color-p1); color: var(--color-p1); }
    .summary-chip.p2 { border-color: var(--color-p2); color: var(--color-p2); }
    .summary-chip.total { border-color: var(--color-text); color: var(--color-text); }

    /* --- Defect Cards --- */
    .defect-list { display: flex; flex-direction: column; gap: 16px; }

    .defect-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      overflow: hidden;
    }

    .defect-card.severity-P0 { border-left: 4px solid var(--color-p0); }
    .defect-card.severity-P1 { border-left: 4px solid var(--color-p1); }
    .defect-card.severity-P2 { border-left: 4px solid var(--color-p2); }

    .defect-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border);
      flex-wrap: wrap;
    }

    .severity-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .severity-badge.P0 { background: var(--color-p0); }
    .severity-badge.P1 { background: var(--color-p1); }
    .severity-badge.P2 { background: var(--color-p2); }

    .category-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      background: var(--color-code-bg);
      color: var(--color-text-secondary);
    }

    .defect-title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }

    .confidence-tag {
      font-size: 12px;
      color: var(--color-text-secondary);
      white-space: nowrap;
    }

    .defect-body { padding: 20px; }

    .defect-location {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 12px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    .defect-section { margin-bottom: 16px; }
    .defect-section:last-child { margin-bottom: 0; }

    .defect-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .defect-section p {
      font-size: 14px;
      line-height: 1.7;
    }

    .code-block {
      background: var(--color-code-bg);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 12px 16px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* --- Empty State --- */
    .empty-state {
      text-align: center;
      padding: 64px 32px;
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: 12px;
    }

    .empty-state h2 {
      font-size: 18px;
      color: #16a34a;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--color-text-secondary);
    }

    /* --- Footer --- */
    .report-footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    /* --- Responsive --- */
    @media (max-width: 640px) {
      body { padding: 12px; }
      .report-header { padding: 20px; }
      .defect-header { padding: 12px 16px; }
      .defect-body { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- ====== Header ====== -->
    <div class="report-header">
      <h1>代码评审报告</h1>
      <div class="meta-grid">
        <div class="meta-item">
          <span class="label">仓库：</span>
          <span>__REPO_NAME__</span>
        </div>
        <div class="meta-item">
          <span class="label">检测模式：</span>
          <span>__REVIEW_MODE__</span>
        </div>
        <div class="meta-item">
          <span class="label">检测范围：</span>
          <span>__DIFF_RANGE__</span>
        </div>
        <div class="meta-item">
          <span class="label">生成时间：</span>
          <span>__GENERATED_AT__</span>
        </div>
      </div>
    </div>

    <!-- ====== P0 Alert (hidden when no P0) ====== -->
    <div class="p0-alert">
      <div class="p0-alert-title">高优先级告警 — 发现 P0 级别缺陷，建议立即处理</div>
      <ul class="p0-alert-list">
        __P0_ALERT_ITEMS__
      </ul>
    </div>

    <!-- ====== Summary ====== -->
    <div class="summary-bar">
      <div class="summary-chip p0"><span class="count">__COUNT_P0__</span> P0</div>
      <div class="summary-chip p1"><span class="count">__COUNT_P1__</span> P1</div>
      <div class="summary-chip p2"><span class="count">__COUNT_P2__</span> P2</div>
      <div class="summary-chip total"><span class="count">__COUNT_TOTAL__</span> 合计</div>
    </div>

    <!-- ====== Defect List ====== -->
    <div class="defect-list">
      __DEFECT_CARDS__
    </div>

    <!-- ====== Empty State (shown when no defects) ====== -->
    <!-- __EMPTY_STATE_START__
    <div class="empty-state">
      <h2>未发现缺陷</h2>
      <p>本次评审未发现 P0-P2 级别的缺陷。共检查 __FILE_COUNT__ 个文件，约 __LINE_COUNT__ 行变更。</p>
    </div>
    __EMPTY_STATE_END__ -->

    <div class="report-footer">
      bits-code-guard &middot; 由 AI 辅助生成 &middot; __GENERATED_AT__
    </div>

  </div>
</body>
</html>
