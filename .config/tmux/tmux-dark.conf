# tmux dark theme (sourced by tmux-dark-notify)
set -g @tmux_power_theme 'everforest'
run '$HOME/.config/tmux/plugins/tmux-power/tmux-power.tmux'
setw -g pane-border-style "fg=#555555"
setw -g pane-active-border-style "fg=#555555"
run 'mkdir -p $HOME/.local/state/delta && printf "[delta]\n    features = woolly-mammoth\n" > $HOME/.local/state/delta/theme.gitconfig'
run 'mkdir -p $HOME/.local/state/nvim && printf "dark\n" > $HOME/.local/state/nvim/theme-mode'
