# tmux light theme (sourced by tmux-dark-notify)
set -g @tmux_power_theme 'snow'
run '$HOME/.config/tmux/plugins/tmux-power/tmux-power.tmux'
setw -g pane-border-style "fg=#c8c8c8"
setw -g pane-active-border-style "fg=#c8c8c8"
run 'mkdir -p $HOME/.local/state/delta && printf "[delta]\n    features = hoopoe\n" > $HOME/.local/state/delta/theme.gitconfig'
run 'mkdir -p $HOME/.local/state/nvim && printf "light\n" > $HOME/.local/state/nvim/theme-mode'
